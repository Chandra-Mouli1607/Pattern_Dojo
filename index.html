<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0c0f14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pattern Dojo">
<meta name="description" content="Master candlestick & chart patterns with plain-English explanations">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<title>Pattern Dojo — Master Candlestick & Chart Patterns</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=IBM+Plex+Mono:wght@400;600&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0c0f14;
  --surface: #13161d;
  --surface-2: #1a1e27;
  --surface-3: #222730;
  --border: #2a2f3a;
  --text: #e8eaf0;
  --text-dim: #8a90a0;
  --text-muted: #555b6e;
  --green: #22c55e;
  --green-dim: rgba(34,197,94,0.12);
  --green-glow: rgba(34,197,94,0.25);
  --red: #ef4444;
  --red-dim: rgba(239,68,68,0.12);
  --red-glow: rgba(239,68,68,0.25);
  --gold: #f59e0b;
  --gold-dim: rgba(245,158,11,0.12);
  --blue: #3b82f6;
  --blue-dim: rgba(59,130,246,0.12);
  --accent: #a78bfa;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  line-height: 1.6;
  overflow-x: hidden;
}

/* SCROLLBAR */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* HERO */
.hero {
  text-align: center;
  padding: 60px 20px 40px;
  position: relative;
  overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute;
  top: -100px; left: 50%; transform: translateX(-50%);
  width: 600px; height: 600px;
  background: radial-gradient(circle, rgba(167,139,250,0.08) 0%, transparent 70%);
  pointer-events: none;
}
.hero h1 {
  font-family: 'DM Serif Display', serif;
  font-size: clamp(2.2rem, 5vw, 3.5rem);
  letter-spacing: -0.5px;
  margin-bottom: 12px;
  background: linear-gradient(135deg, #e8eaf0 40%, var(--accent));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.hero p {
  color: var(--text-dim);
  font-size: 1.05rem;
  max-width: 560px;
  margin: 0 auto;
}
.hero .badge {
  display: inline-block;
  margin-top: 18px;
  padding: 6px 16px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 20px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.78rem;
  color: var(--accent);
  letter-spacing: 0.5px;
}

/* NAV TABS */
.nav-wrap {
  position: sticky; top: 0; z-index: 100;
  background: rgba(12,15,20,0.85);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
}
.nav {
  display: flex;
  max-width: 900px;
  margin: 0 auto;
  gap: 4px;
  overflow-x: auto;
  scrollbar-width: none;
}
.nav::-webkit-scrollbar { display: none; }
.nav button {
  flex-shrink: 0;
  padding: 14px 20px;
  background: none;
  border: none;
  color: var(--text-muted);
  font-family: 'Outfit', sans-serif;
  font-size: 0.88rem;
  font-weight: 500;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.25s;
  white-space: nowrap;
}
.nav button:hover { color: var(--text-dim); }
.nav button.active {
  color: var(--text);
  border-bottom-color: var(--accent);
}

/* FILTER PILLS */
.filters {
  display: flex;
  justify-content: center;
  gap: 8px;
  padding: 24px 20px 8px;
  flex-wrap: wrap;
}
.filters button {
  padding: 7px 18px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-dim);
  font-family: 'Outfit', sans-serif;
  font-size: 0.82rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
}
.filters button:hover { border-color: var(--text-muted); color: var(--text); }
.filters button.active-all { border-color: var(--accent); color: var(--accent); background: rgba(167,139,250,0.08); }
.filters button.active-bull { border-color: var(--green); color: var(--green); background: var(--green-dim); }
.filters button.active-bear { border-color: var(--red); color: var(--red); background: var(--red-dim); }
.filters button.active-neutral { border-color: var(--gold); color: var(--gold); background: var(--gold-dim); }

/* GRID */
.grid {
  max-width: 1100px;
  margin: 20px auto;
  padding: 0 20px 60px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 16px;
}

/* CARD */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
  cursor: pointer;
  transition: all 0.3s;
  animation: fadeUp 0.4s ease both;
}
.card:hover {
  border-color: var(--text-muted);
  transform: translateY(-3px);
  box-shadow: 0 12px 40px rgba(0,0,0,0.3);
}
@keyframes fadeUp {
  from { opacity:0; transform:translateY(16px); }
  to { opacity:1; transform:translateY(0); }
}
.card-canvas {
  height: 180px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}
.card-canvas.bull { background: linear-gradient(180deg, var(--green-dim), transparent); }
.card-canvas.bear { background: linear-gradient(180deg, var(--red-dim), transparent); }
.card-canvas.neutral { background: linear-gradient(180deg, var(--gold-dim), transparent); }
.card-canvas svg { width: 90%; height: 80%; }
.card-body { padding: 18px 20px 20px; }
.card-tag {
  display: inline-block;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.68rem;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 3px 10px;
  border-radius: 4px;
  margin-bottom: 8px;
}
.tag-bull { background: var(--green-dim); color: var(--green); }
.tag-bear { background: var(--red-dim); color: var(--red); }
.tag-neutral { background: var(--gold-dim); color: var(--gold); }
.card-title {
  font-family: 'DM Serif Display', serif;
  font-size: 1.2rem;
  margin-bottom: 6px;
}
.card-subtitle {
  color: var(--text-dim);
  font-size: 0.85rem;
  line-height: 1.5;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.card-meta {
  margin-top: 12px;
  display: flex;
  gap: 12px;
  font-size: 0.75rem;
  color: var(--text-muted);
  font-family: 'IBM Plex Mono', monospace;
}
.card-meta span {
  display: flex;
  align-items: center;
  gap: 4px;
}

/* MODAL */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(6px);
  z-index: 200;
  justify-content: center;
  align-items: flex-start;
  padding: 40px 20px;
  overflow-y: auto;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 18px;
  width: 100%;
  max-width: 700px;
  animation: modalIn 0.3s ease;
  margin-bottom: 40px;
}
@keyframes modalIn {
  from { opacity:0; transform:translateY(24px) scale(0.97); }
  to { opacity:1; transform:translateY(0) scale(1); }
}
.modal-header {
  padding: 28px 28px 0;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}
.modal-close {
  width: 36px; height: 36px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--surface-2);
  color: var(--text-dim);
  font-size: 1.2rem;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
  flex-shrink: 0;
}
.modal-close:hover { background: var(--surface-3); color: var(--text); }
.modal-canvas {
  margin: 20px 28px;
  height: 220px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
.modal-canvas.bull { background: linear-gradient(135deg, var(--green-dim), rgba(34,197,94,0.03)); border: 1px solid rgba(34,197,94,0.15); }
.modal-canvas.bear { background: linear-gradient(135deg, var(--red-dim), rgba(239,68,68,0.03)); border: 1px solid rgba(239,68,68,0.15); }
.modal-canvas.neutral { background: linear-gradient(135deg, var(--gold-dim), rgba(245,158,11,0.03)); border: 1px solid rgba(245,158,11,0.15); }
.modal-canvas svg { width: 85%; height: 85%; }
.modal-content { padding: 0 28px 28px; }
.modal-content h2 {
  font-family: 'DM Serif Display', serif;
  font-size: 1.6rem;
  margin-bottom: 4px;
}
.modal-section {
  margin-top: 20px;
}
.modal-section h3 {
  font-size: 0.78rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--accent);
  margin-bottom: 10px;
  font-family: 'IBM Plex Mono', monospace;
}
.modal-section p, .modal-section li {
  color: var(--text-dim);
  font-size: 0.92rem;
  line-height: 1.7;
}
.modal-section ul {
  list-style: none;
  padding: 0;
}
.modal-section li {
  padding: 6px 0 6px 20px;
  position: relative;
}
.modal-section li::before {
  content: '→';
  position: absolute;
  left: 0;
  color: var(--accent);
}
.modal-tip {
  margin-top: 20px;
  padding: 16px 18px;
  background: var(--surface-2);
  border-left: 3px solid var(--accent);
  border-radius: 0 10px 10px 0;
}
.modal-tip .tip-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.72rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--accent);
  margin-bottom: 6px;
}
.modal-tip p {
  color: var(--text-dim);
  font-size: 0.88rem;
  line-height: 1.6;
}
.modal-stats {
  display: flex;
  gap: 12px;
  margin-top: 16px;
  flex-wrap: wrap;
}
.stat-chip {
  padding: 8px 14px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 0.8rem;
}
.stat-chip .stat-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.65rem;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.8px;
}
.stat-chip .stat-value {
  font-weight: 600;
  margin-top: 2px;
}

/* RESPONSIVE */
@media (max-width: 600px) {
  .hero { padding: 40px 16px 28px; }
  .grid { grid-template-columns: 1fr; padding: 0 12px 40px; }
  .modal-header, .modal-content { padding-left: 20px; padding-right: 20px; }
  .modal-canvas { margin: 16px 20px; height: 180px; }
  .nav button { padding: 12px 14px; font-size: 0.82rem; }
}

/* PWA standalone mode — safe area for notched phones */
@media (display-mode: standalone) {
  .hero { padding-top: calc(60px + env(safe-area-inset-top)); }
  .nav-wrap { padding-top: env(safe-area-inset-top); }
  body { padding-bottom: env(safe-area-inset-bottom); }
}
</style>
</head>

// ─── STATE ──────────────────────────────────────────────
let currentTab = 'candle';
let currentFilter = 'all';

// ─── RENDER ─────────────────────────────────────────────
function renderGrid() {
  const grid = document.getElementById('grid');
  const data = patterns[currentTab].filter(p => {
    if (currentFilter === 'all') return true;
    if (currentFilter === 'neutral') return p.type === 'neutral';
    return p.type === currentFilter;
  });

  grid.innerHTML = data.map((p, i) => {
    const typeLabel = p.type === 'bullish' ? 'bull' : p.type === 'bearish' ? 'bear' : 'neutral';
    return `
    <div class="card" onclick="openModal('${currentTab}', '${p.name}')" style="animation-delay:${i*0.05}s">
      <div class="card-canvas ${typeLabel}">${p.svg}</div>
      <div class="card-body">
        <span class="card-tag tag-${typeLabel}">${p.type}</span>
        <h3 class="card-title">${p.name}</h3>
        <p class="card-subtitle">${p.subtitle}</p>
        <div class="card-meta">
          <span>⚡ ${p.reliability}</span>
          <span>⏱ ${p.timeframe}</span>
        </div>
      </div>
    </div>`;
  }).join('');
}

function openModal(tab, name) {
  const p = patterns[tab].find(x => x.name === name);
  if (!p) return;
  const typeLabel = p.type === 'bullish' ? 'bull' : p.type === 'bearish' ? 'bear' : 'neutral';

  document.getElementById('modal').innerHTML = `
    <div class="modal-header">
      <div>
        <span class="card-tag tag-${typeLabel}" style="margin-bottom:6px">${p.type}</span>
        <h2 style="font-family:'DM Serif Display',serif;font-size:1.6rem;">${p.name}</h2>
        <p style="color:var(--text-dim);font-size:0.9rem;margin-top:4px;">${p.subtitle}</p>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-canvas ${typeLabel}">${p.svg}</div>
    <div class="modal-content">
      <div class="modal-stats">
        <div class="stat-chip">
          <div class="stat-label">Reliability</div>
          <div class="stat-value">${p.reliability}</div>
        </div>
        <div class="stat-chip">
          <div class="stat-label">Best Timeframe</div>
          <div class="stat-value">${p.timeframe}</div>
        </div>
        <div class="stat-chip">
          <div class="stat-label">Signal Type</div>
          <div class="stat-value" style="text-transform:capitalize">${p.type} ${currentTab === 'candle' ? 'Reversal' : 'Pattern'}</div>
        </div>
      </div>

      <div class="modal-section">
        <h3>🔍 What It Looks Like</h3>
        <p>${p.what}</p>
      </div>

      <div class="modal-section">
        <h3>📖 The Story Behind It</h3>
        <p>${p.story}</p>
      </div>

      <div class="modal-section">
        <h3>🎯 How To Trade It</h3>
        <ul>${p.howToTrade.map(t => `<li>${t}</li>`).join('')}</ul>
      </div>

      <div class="modal-tip">
        <div class="tip-label">💡 Pro Tip</div>
        <p>${p.proTip}</p>
      </div>
    </div>
  `;

  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

// ─── EVENTS ─────────────────────────────────────────────
document.getElementById('nav').addEventListener('click', e => {
  if (e.target.tagName !== 'BUTTON') return;
  document.querySelectorAll('#nav button').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  currentTab = e.target.dataset.tab;
  currentFilter = 'all';
  updateFilters();
  renderGrid();
});

document.getElementById('filters').addEventListener('click', e => {
  if (e.target.tagName !== 'BUTTON') return;
  currentFilter = e.target.dataset.filter;
  updateFilters();
  renderGrid();
});

function updateFilters() {
  document.querySelectorAll('#filters button').forEach(b => {
    b.className = '';
    if (b.dataset.filter === currentFilter) {
      const cls = currentFilter === 'all' ? 'active-all' :
                  currentFilter === 'bullish' ? 'active-bull' :
                  currentFilter === 'bearish' ? 'active-bear' : 'active-neutral';
      b.classList.add(cls);
    }
  });
}

document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

// ─── INIT ───────────────────────────────────────────────
renderGrid();

// ─── PWA SERVICE WORKER ─────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js')
    .then(reg => console.log('SW registered:', reg.scope))
    .catch(err => console.log('SW failed:', err));
}

// ─── PWA INSTALL PROMPT ─────────────────────────────────
let deferredPrompt;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  showInstallBanner();
});

function showInstallBanner() {
  if (document.getElementById('installBanner')) return;
  const banner = document.createElement('div');
  banner.id = 'installBanner';
  banner.innerHTML = `
    <div style="
      position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
      background:var(--surface-2); border:1px solid var(--accent);
      border-radius:14px; padding:14px 20px; display:flex; align-items:center;
      gap:14px; z-index:300; box-shadow:0 8px 32px rgba(0,0,0,0.4);
      max-width:420px; width:calc(100% - 32px); animation:fadeUp 0.4s ease;
      font-family:'Outfit',sans-serif;
    ">
      <div style="flex:1">
        <div style="font-weight:600;font-size:0.92rem;color:var(--text);">Install Pattern Dojo</div>
        <div style="font-size:0.78rem;color:var(--text-dim);margin-top:2px;">Add to home screen for offline access</div>
      </div>
      <button onclick="installApp()" style="
        padding:8px 18px; background:var(--accent); color:#0c0f14; border:none;
        border-radius:8px; font-weight:600; font-size:0.82rem; cursor:pointer;
        font-family:'Outfit',sans-serif; white-space:nowrap;
      ">Install</button>
      <button onclick="this.parentElement.parentElement.remove()" style="
        background:none; border:none; color:var(--text-muted); font-size:1.2rem;
        cursor:pointer; padding:4px; line-height:1;
      ">✕</button>
    </div>
  `;
  document.body.appendChild(banner);
}

async function installApp() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const result = await deferredPrompt.userChoice;
  if (result.outcome === 'accepted') {
    document.getElementById('installBanner')?.remove();
  }
  deferredPrompt = null;
}

// Detect standalone mode (already installed)
if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone) {
  console.log('Running as installed PWA');
}
</script>
</body>
</html>
